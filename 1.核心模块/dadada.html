<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    div {
      width: 300px;
      height: 400px;
    }

    .div {
      transition: .5s;
    }

    .box {
      margin: 200px auto;
    }

    .div1 {
      background-color: khaki;
    }

    .div2 {
      background-color: goldenrod;
      transform: translateY(-400px);
    }

    .div3 {
      background-color: indigo;
      transform: translateY(-800px);

    }

    .div4 {
      background-color: beige;
      transform: translateY(-1200px);

    }

    .div5 {
      background-color: hotpink;
      transform: translateY(-1600px);

    }

    .div6 {
      background-color: gold;
      transform: translateY(-2000px);
    }

    .div7 {
      background-color: firebrick;
      transform: translateY(-2400px);

    }

    .div8 {
      background-color: darkcyan;
      transform: translateY(-2800px);

    }

    .div9 {
      background-color: chartreuse;
      transform: translateY(-3200px);

    }

    .div10 {
      background-color: black;
      transform: translateY(-3600px);

    }

    .div11 {
      background-color: aqua;
      transform: translateY(-4000px);
    }

    .div12 {
      background-color: pink;
      transform: translateY(-4400px);
    }

    .box:hover .div12 {
      transform: translateY(-4400px) rotate(60deg);
      transform-origin: 50% 100%;
    }
    .box:hover .div11 {
      transform: translateY(-4000px) rotate(50deg);
      transform-origin: 50% 100%;
    }
    .box:hover .div10 {
      transform: translateY(-3600px) rotate(40deg);
      transform-origin: 50% 100%;
    }
    .box:hover .div9 {
      transform: translateY(-3200px) rotate(30deg);
      transform-origin: 50% 100%;
    }
    .box:hover .div8 {
      transform: translateY(-2800px) rotate(20deg);
      transform-origin: 50% 100%;
    }
    .box:hover .div7 {
      transform: translateY(-2400px) rotate(10deg);
      transform-origin: 50% 100%;
    }
    .box:hover .div6 {
      transform: translateY(-2000px) rotate(-10deg);
      transform-origin: 50% 100%;
    }
    .box:hover .div5 {
      transform: translateY(-1600px) rotate(-20deg);
      transform-origin: 50% 100%;
    }
    .box:hover .div4 {
      transform: translateY(-1200px) rotate(-30deg);
      transform-origin: 50% 100%;
    }
    .box:hover .div3 {
      transform: translateY(-800px) rotate(-40deg);
      transform-origin: 50% 100%;
    }
    .box:hover .div2 {
      transform: translateY(-400px) rotate(-50deg);
      transform-origin: 50% 100%;
    }
    .box:hover .div1 {
      transform: rotate(-60deg);
      transform-origin: 50% 100%;
    }

  </style>
</head>

<body>
  <div class="box">
    <div class="div div1">1</div>
    <div class="div div2">2</div>
    <div class="div div3">3</div>
    <div class="div div4">4</div>
    <div class="div div5">5</div>
    <div class="div div6">6</div>
    <div class="div div7">7</div>
    <div class="div div8">8</div>
    <div class="div div9">9</div>
    <div class="div div10">10</div>
    <div class="div div11">11</div>
    <div class="div div12">12</div>
  </div>
</body>

</html>
